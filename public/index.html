<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank ONO — Sledování cen</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Tank ONO — Ceny paliv</h1>

    <section class="cards">
      <div class="card">
        <div class="card-label">Natural 95</div>
        <div class="card-price" id="price-natural95">...</div>
        <div class="card-unit">Kč / l</div>
      </div>
      <div class="card">
        <div class="card-label">Diesel</div>
        <div class="card-price" id="price-diesel">...</div>
        <div class="card-unit">Kč / l</div>
      </div>
      <div class="card">
        <div class="card-label">LPG</div>
        <div class="card-price" id="price-lpg">...</div>
        <div class="card-unit">Kč / l</div>
      </div>
    </section>

    <section class="chart-section">
      <h2>Vývoj cen</h2>
      <canvas id="priceChart"></canvas>
    </section>

    <section class="history-section">
      <h2>Historie změn</h2>
      <table id="history-table">
        <thead>
          <tr>
            <th>Datum</th>
            <th>Natural 95</th>
            <th>Diesel</th>
            <th>LPG</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </section>

    <section class="subscribe-section">
      <h2>Odebírat upozornění</h2>
      <p>Zadejte e-mail a dostanete zprávu při každé změně cen.</p>
      <form id="subscribe-form">
        <input type="email" id="sub-email" placeholder="vas@email.cz" required />
        <button type="submit">Odebírat</button>
      </form>
      <p id="sub-message" class="sub-message"></p>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
